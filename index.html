<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ArmVet" />
    <meta name="application-name" content="ArmVet Dashboard" />
    <meta name="theme-color" content="#0C0F14" />
    <title>ArmVet Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #0C0F14; min-height: 100vh; }
      #root { min-height: 100vh; }
      #app-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #C8A84E;
      }
      #app-loading h1 { font-size: 1.6rem; margin: 0; letter-spacing: 0.05em; }
      #app-loading p { font-size: 0.9rem; color: #888; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading">
        <h1>ArmVet</h1>
        <p>Loading...</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
