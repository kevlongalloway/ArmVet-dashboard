services:
  - type: web
    name: armvet-dashboard
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: armvet-postgres
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_SITE_URL
        value: https://armvet.onrender.com
      - key: DASHBOARD_URL
        value: https://armvet-dashboard.onrender.com

databases:
  - name: armvet-postgres
    plan: free
